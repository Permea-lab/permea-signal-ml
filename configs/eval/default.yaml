# Cross-validation strategy used by baseline evaluation.
split_policy: stratified_kfold
# Number of folds for stratified k-fold evaluation.
cv_folds: 5
# Seed used for reproducible splits and estimators.
random_seed: 42
# Metrics exported into benchmark summaries.
metrics:
  - roc_auc
  - pr_auc
  - precision
  - recall
  - f1
  - mcc
