# Linear baseline model for sequence-derived feature vectors.
model_name: logistic_regression
# L2 regularization keeps the baseline stable on small datasets.
penalty: l2
# Inverse regularization strength passed to scikit-learn.
C: 1.0
max_iter: 1000
# Balanced weights help compensate for class imbalance in the current task.
class_weight: balanced
random_state: 42
